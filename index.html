<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solveur de Mots</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Trouveur de Mots 🕵️‍♂️</h1>

        <label for="lettres">Tes 5 lettres :</label>
        <input type="text" id="lettres" maxlength="5" placeholder="ex: aebrm">

        <label for="debut">Commence par (optionnel) :</label>
        <input type="text" id="debut" maxlength="1" placeholder="ex: b">

        <label for="longueur">Longueur du mot (optionnel) :</label>
        <input type="number" id="longueur" min="3" max="5" placeholder="ex: 4">

        <button onclick="lancerRecherche()">Rechercher</button>

        <h2>Résultats (<span id="compteur">0</span>) :</h2>
        <ul id="resultats">
            <li>Les mots s'afficheront ici...</li>
        </ul>
    </div>

    <script src="script.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solveur de Mots</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Word Finder 🕵️‍♂️</h1>

        <label for="lettres">Your letters:</label>
        <input type="text" id="lettres" maxlength="8" placeholder="ex: aebrm">

        
        <div class="grille-pattern">
            <input type="text" id="pos1" maxlength="1">
            <input type="text" id="pos2" maxlength="1">
            <input type="text" id="pos3" maxlength="1">
            <input type="text" id="pos4" maxlength="1">
            <input type="text" id="pos5" maxlength="1">
            <input type="text" id="pos6" maxlength="1">
            <input type="text" id="pos7" maxlength="1">
            <input type="text" id="pos8" maxlength="1">
        </div>

        <label for="longueur">Word length:</label>
        <input type="number" id="longueur" min="3" max="8" placeholder="ex: 4">

        <button onclick="lancerRecherche()">Rechercher</button>

        <h2>Results (<span id="compteur">0</span>) :</h2>
        <ul id="resultats">
            <li>...</li>
        </ul>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
